policy_title: Open Source Attribution Policy
policy_body: |
  The organization requires that all derivative works based on open source components include attribution to the original author in product documentation and distribution materials. Any software module, library, or creative work that is adapted, modified, or incorporated from open source sources must retain the original copyright notice and identify the source project, contributor, and licensing terms. Attribution is required for both internal and external distribution, and it must be visible in both technical documentation and consumer-facing materials where applicable.

  To comply with this policy, developers and content creators must maintain a comprehensive attribution record for every open source component used in a derivative work. The record should capture the original project name, version, license type, contributor acknowledgements, and the specific modifications made. When derivative works are shared internally, attribution may appear in internal release notes, design documents, or source code headers. When distributed externally, attribution should also be included in user manuals, product websites, and end-user licensing materials. Failure to provide attribution may result in non-compliance with open source license obligations and could expose the organization to legal risk, so the policy includes a review process for all release artifacts to verify that required attribution text appears where necessary.
