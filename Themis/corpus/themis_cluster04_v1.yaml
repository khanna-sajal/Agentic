policy_title: BYOD Security Policy
policy_body: |
  The Bring Your Own Device (BYOD) security policy requires that personal devices used for work must employ company-managed antivirus and require a screen lock to protect corporate resources and personal data. Employees who connect personal laptops, tablets, or smartphones to corporate systems must install the company-approved antivirus solution, which is configured to update automatically and perform scheduled scans. The screen lock should activate after no more than five minutes of inactivity, and devices must be configured to require strong authentication before unlocking.

  Devices must be registered and approved before accessing corporate resources. The registration process includes validation of device security posture, confirmation of endpoint encryption, and verification that the device meets current patch and configuration standards. The policy also specifies that personal devices may not store sensitive corporate data unless the device is enrolled in the mobile device management platform and full-disk encryption is enabled. This approach ensures that personal devices accessing corporate networks maintain a consistent baseline of protection, reducing the likelihood of malware introduction, unauthorized access, and data exposure.
