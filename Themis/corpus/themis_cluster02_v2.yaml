policy_title: Open Source Attribution Clarification
policy_body: |
  This clarification refines the attribution requirement by specifying acceptable formats and distribution contexts. Attribution to the original author is required and may be satisfied by digital notices, printed acknowledgments, or embedded metadata, depending on the medium of distribution. The requirement applies to public distributions, customer-facing deliverables, and any product documentation that accompanies externally released software.

  The policy clarifies that attribution can be delivered through a third-party acknowledgment page, a NOTICE file in the distribution package, or a clearly marked section of release documentation, so long as the original author and license are identified. For digital products, attribution should be accessible through the product’s About section, legal information screen, or accompanying README file. For printed media, attribution should appear in user guides, manuals, or packaging inserts. This version also emphasizes that attribution remains a compliance obligation even when derivative works incorporate code with permissive licenses, because proper acknowledgement respects author rights and helps demonstrate good open source governance.
